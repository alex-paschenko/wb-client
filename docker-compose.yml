services:
  app:
    build:
      context: ./app
      args:
        UID: ${DOCKER_UID}
        GID: ${DOCKER_GID}
    user: "${DOCKER_UID}:${DOCKER_GID}"
    container_name: whitebit-bot-app
    ports:
      - '3000:3000'
      - '5173:5173'
    volumes:
      - ./app:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  postgres:
    image: postgres:17
    container_name: whitebit-bot-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: whitebit_bot
      POSTGRES_USER: whitebit
      POSTGRES_PASSWORD: whitebit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whitebit -d whitebit_bot']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
